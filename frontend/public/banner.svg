<svg width="1000" height="250" viewBox="0 0 1000 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#e879f9" />
    </linearGradient>
    
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1000" height="250" fill="url(#bg)" />
  <rect width="1000" height="250" fill="url(#grid)" />

  <circle cx="150" cy="0" r="350" fill="url(#glow1)" />
  <circle cx="850" cy="250" r="400" fill="url(#glow2)" />

  <g transform="translate(460, 35) scale(3.5)">
    <path d="M22 10v6M2 10l10-5 10 5-10 5z" stroke="url(#textGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M6 12v5c3 3 9 3 12 0v-5" stroke="url(#textGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="500" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="54" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">Nexus Edu</text>
  <text x="500" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">An Elevated, Modern &amp; Open-Source Educational Platform</text>
</svg>
